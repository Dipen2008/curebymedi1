<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#2E5B55" />
<link rel="manifest" href="/manifest.json" />
<title>Drug interaction checker — CureByMedi</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="topbar">
  <a href="/dashboard.html" class="brand"><span class="dot"></span> CureByMedi</a>
  <a href="/dashboard.html" class="btn btn-ghost">← Back</a>
</header>
<main class="container">
  <div style="padding: 24px 0 8px;">
    <h1 style="font-family:Outfit;font-size:clamp(26px,6vw,34px);font-weight:600;">Drug interaction checker</h1>
    <p class="muted small" style="margin-top:6px;">Add 2-6 medicines you're taking. We'll tell you if they're safe together.</p>
  </div>

  <div class="card" style="margin-top: 14px;">
    <div id="picker">
      <label class="label">Add medicine</label>
      <input id="medInput" class="input" placeholder="Type a medicine name, then press Enter…" />
      <div id="suggestions" class="card-flat" style="margin-top:8px; max-height: 260px; overflow-y:auto; display:none;"></div>
      <div id="picked" style="margin-top:14px; display:flex; flex-wrap:wrap; gap:6px;"></div>
      <button id="checkBtn" class="btn btn-primary btn-block btn-lg" style="margin-top:18px;" disabled>Check interactions</button>
    </div>
  </div>

  <div id="loading" class="alert" style="background:var(--brand-soft);color:var(--brand);margin-top:14px;display:none;">
    <span class="spinner"></span> Analysing interactions…
  </div>

  <div id="result" class="hidden" style="margin-top:14px;"></div>
</main>
<script src="/js/api.js"></script>
<script src="/js/interactions.js"></script>
</body>
</html>
