<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#2E5B55" />
<link rel="manifest" href="/manifest.json" />
<title>Profile — CureByMedi</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="topbar">
  <a href="/dashboard.html" class="brand"><span class="dot"></span> CureByMedi</a>
  <a href="/dashboard.html" class="btn btn-ghost">← Back</a>
</header>
<main class="container">
  <div style="padding:24px 0 8px;">
    <h1 style="font-family:Outfit;font-size:clamp(26px,6vw,34px);font-weight:600;">Profile</h1>
  </div>

  <div class="card" style="margin-top:14px;">
    <div class="label">Account</div>
    <div id="acct" style="font-family:Outfit;font-size:18px;font-weight:600;">—</div>
    <div class="small muted" id="meta">—</div>
  </div>

  <div class="card" style="margin-top:14px;">
    <h2 style="font-family:Outfit;font-size:18px;font-weight:600;margin-bottom:10px;">Language</h2>
    <div class="row" style="gap:8px;">
      <button class="chip" onclick="changeLang('en')" id="lang-en">English</button>
      <button class="chip" onclick="changeLang('hi')" id="lang-hi">हिन्दी (Hindi)</button>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <h2 style="font-family:Outfit;font-size:18px;font-weight:600;margin-bottom:10px;">Change password</h2>
    <form id="pwForm" class="spaced">
      <div><label class="label">Current password</label><input class="input" type="password" name="oldPassword" required /></div>
      <div><label class="label">New password (min 6 chars)</label><input class="input" type="password" name="newPassword" required minlength="6" /></div>
      <div id="pwErr" class="alert alert-error hidden"></div>
      <div id="pwOk" class="alert alert-success hidden"></div>
      <button class="btn btn-primary">Update password</button>
    </form>
  </div>

  <div class="card" style="margin-top:14px;">
    <h2 style="font-family:Outfit;font-size:18px;font-weight:600;margin-bottom:10px;">Install app</h2>
    <p class="small muted">CureByMedi works as an app on your phone. From your browser menu choose <strong>"Add to Home screen"</strong>.</p>
    <button id="installBtn" class="btn btn-secondary" style="margin-top:10px;display:none;">📲 Install now</button>
  </div>

  <div class="card" style="margin-top:14px;border-color:#FECACA;">
    <h2 style="font-family:Outfit;font-size:18px;font-weight:600;margin-bottom:10px;color:#991B1B;">Danger zone</h2>
    <p class="small muted">Permanently delete your account, favorites and reminders. This cannot be undone.</p>
    <button id="deleteBtn" class="btn btn-danger" style="margin-top:10px;">Delete my account</button>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
let DEFERRED_INSTALL = null;
window.addEventListener("beforeinstallprompt", (e) => { e.preventDefault(); DEFERRED_INSTALL = e; $("#installBtn").style.display = "inline-flex"; });

(async function () {
  const me = await requireAuth();
  injectBottomNav("profile");
  $("#acct").textContent = me.email;
  $("#meta").textContent = `${me.role.toUpperCase()} · ${me.favoritesCount} favorites · ${me.remindersCount} reminders`;
  document.getElementById("lang-" + (me.language || "en")).classList.add("active");

  $("#pwForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("#pwErr").classList.add("hidden"); $("#pwOk").classList.add("hidden");
    const data = Object.fromEntries(new FormData(e.target));
    try {
      await A.changePassword(data.oldPassword, data.newPassword);
      $("#pwOk").textContent = "✓ Password updated"; $("#pwOk").classList.remove("hidden");
      e.target.reset();
    } catch (err) {
      $("#pwErr").textContent = err.message; $("#pwErr").classList.remove("hidden");
    }
  });

  $("#installBtn").addEventListener("click", async () => {
    if (!DEFERRED_INSTALL) return;
    DEFERRED_INSTALL.prompt();
    await DEFERRED_INSTALL.userChoice;
    DEFERRED_INSTALL = null;
    $("#installBtn").style.display = "none";
  });

  $("#deleteBtn").addEventListener("click", async () => {
    if (!confirm("Permanently delete your account?")) return;
    if (!confirm("Are you absolutely sure? This cannot be undone.")) return;
    try { await A.deleteMe(); setToken(null); window.location.href = "/"; }
    catch (e) { alert(e.message); }
  });
})();

window.changeLang = async (l) => {

    setLang(l);

    try {
        await A.setLanguage(l);
    } catch (_e) {}

    ["en","hi"].forEach((x) => {
        document.getElementById("lang-" + x).classList.toggle("active", x === l);
    });

    // Reload the current page so the selected language is applied
    location.reload();
};
</script>
</body>
</html>
