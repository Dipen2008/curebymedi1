<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#2E5B55" />
<link rel="manifest" href="/manifest.json" />
<title>Reminders — CureByMedi</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="topbar">
  <a href="/dashboard.html" class="brand"><span class="dot"></span> CureByMedi</a>
  <a href="/dashboard.html" class="btn btn-ghost">← Back</a>
</header>
<main class="container">
  <div style="padding:24px 0 8px;">
    <h1 style="font-family:Outfit;font-size:clamp(26px,6vw,34px);font-weight:600;">Pill reminders</h1>
    <p class="muted small" style="margin-top:6px;">Set daily times — your phone/browser will notify you. Keep this tab open for alerts.</p>
  </div>

  <div class="card" style="margin-top:14px;">
    <form id="form" class="spaced">
      <div><label class="label">Medicine name *</label><input class="input" name="name" required placeholder="e.g. Crocin 500mg" /></div>
      <div><label class="label">Times (24h, comma-separated, e.g. 08:00, 14:00, 20:00) *</label><input class="input" name="times" required placeholder="08:00, 20:00" /></div>
      <div><label class="label">Notes</label><input class="input" name="notes" placeholder="after food" /></div>
      <button class="btn btn-primary btn-block">+ Add reminder</button>
    </form>
  </div>

  <div class="section-head"><h2>My reminders</h2><span class="meta" id="count">—</span></div>
  <div id="list" class="spaced"></div>

  <div id="permPrompt" class="alert" style="background:#FEF3C7;color:#92400E;margin-top:14px;display:none;">
    🔔 Click <button class="btn btn-primary" style="padding:6px 12px;font-size:13px;" id="permBtn">Allow notifications</button> to get pill alerts.
  </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/reminders.js"></script>
</body>
</html>
